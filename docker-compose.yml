version: '3.8'

services:

  # PHP-FPM
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: arcana_app
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - arcana_net

  # Nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: arcana_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - arcana_net

  # MySQL
  db:
    image: mysql:8.0
    container_name: arcana_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: arcana
      MYSQL_USER: arcana
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - arcana_db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - arcana_net

  # phpMyAdmin（DB管理GUI）
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: arcana_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - arcana_net

networks:
  arcana_net:
    driver: bridge

volumes:
  arcana_db_data:
